# /opt/homepage/config/services.yaml — LXC 1013 (S2)

- Медиа:
    - Jellyfin:
        icon: jellyfin.png
        href: https://jellyfin.bizzon8n.ru
        description: Медиасервер
    - TrueNAS:
        icon: truenas.png
        href: https://truenas.bizzon8n.ru/ui/
        description: NAS хранилище

- Облако:
    - Nextcloud:
        icon: nextcloud.png
        href: https://nextcloud.bizzon8n.ru
        description: Файлы и синхронизация
    - Joplin:
        icon: joplin.png
        href: https://joplin.bizzon8n.ru
        description: Заметки

- Финансы:
    - Курсы ЦБ РФ:
        icon: mdi-currency-rub
        href: https://www.cbr.ru/currency_base/daily/
        description: ЦБ РФ, ₽ за 1 единицу
        widget:
          type: customapi
          url: https://www.cbr-xml-daily.ru/daily_json.js
          refreshInterval: 3600000
          display: list
          mappings:
            - field: Valute.USD.Value
              label: USD
              format: float
              suffix: " ₽"
            - field: Valute.EUR.Value
              label: EUR
              format: float
              suffix: " ₽"
            - field: Valute.CNY.Value
              label: CNY
              format: float
              suffix: " ₽"
            - field: Valute.GBP.Value
              label: GBP
              format: float
              suffix: " ₽"
    - Криптовалюты:
        icon: mdi-bitcoin
        href: https://www.coingecko.com/
        description: CoinGecko, ₽ и изменение за 24ч
        widget:
          type: customapi
          url: https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana,tether&vs_currencies=rub&include_24hr_change=true
          refreshInterval: 300000
          headers:
            User-Agent: Homepage-Bizzon-Homelab (https://homepage.bizzon8n.ru)
          display: list
          mappings:
            - field: bitcoin.rub
              label: BTC
              format: float
              suffix: " ₽"
              additionalField:
                field: bitcoin.rub_24h_change
                format: percent
            - field: ethereum.rub
              label: ETH
              format: float
              suffix: " ₽"
              additionalField:
                field: ethereum.rub_24h_change
                format: percent
            - field: solana.rub
              label: SOL
              format: float
              suffix: " ₽"
              additionalField:
                field: solana.rub_24h_change
                format: percent
            - field: tether.rub
              label: USDT
              format: float
              suffix: " ₽"
              additionalField:
                field: tether.rub_24h_change
                format: percent

- Инфраструктура:
    - Температуры:
        icon: mdi-thermometer-lines
        description: CPU/GPU homelab (lm-sensors)
        widget:
          type: customapi
          url: http://192.168.10.22:3080/sensors.json
          refreshInterval: 300000
          display: list
          mappings:
            - field: nodes.S1.cpu
              label: S1 CPU
              format: float
              suffix: " °C"
            - field: nodes.S1.gpu
              label: S1 GPU
              format: float
              suffix: " °C"
            - field: nodes.S2.cpu0
              label: S2 CPU0
              format: float
              suffix: " °C"
            - field: nodes.S2.cpu1
              label: S2 CPU1
              format: float
              suffix: " °C"
            - field: nodes.S2.chipset
              label: S2 chipset
              format: float
              suffix: " °C"
            - field: nodes.LLM-PC.cpu
              label: LLM-PC
              format: float
              suffix: " °C"
            - field: nodes.S3.cpu
              label: S3 CPU
              format: float
              suffix: " °C"
